<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <title>Field Palmer Portfolio</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <header>
        <div id="header-content">
            <nav id="top-menu">
                <a id="about" href="index.html">About</a>
                <a id="portfolio" href="portfolio.html">Portfolio</a>
                <a id ="contact" href="contact.html">Contact</a>
            </nav>
            <h1 id="name-box">Field Palmer</h1>
        </div>
    </header>
    <div id="main-content-area">
        <main class="main" id="portfolio">
            <h1 class="section-title" id="portfolio-title">Portfolio</h1>
            <section id="gallery">
                    <div id="hangman-box">
                        <a href="#" class="gallery-icons">
                            <img id="hangman-img" src="/assets/images/hangman_300x200.jpg" id="hangman" alt="hangman">
                            <h3 id="hangman-h3" class="gallery-title">Hangman</h3>
                        </a>
                    </div>
                    <div id="rpg-game-box">
                        <a href="#" class="gallery-icons">
                            <img id="rpg-game-img" src="/assets/images/rpg-300x200.jpg" id="rpg-game" alt="rpg-game">
                            <h3 id="rpg-game-h3" class="gallery-title">RPG Game</h3>
                        </a>
                    </div>
                    <div id="trivia-box">
                        <a href="#" class="gallery-icons">
                            <img id="trivia-img" src="assets/images/trivia300x200.jpeg" id="trivia-game" alt="trivia-game">
                            <h3 id="trivia-h3" class="gallery-title">Trivia Game</h3>
                        </a>
                    </div> 
                    <div id="rutgers-box">
                        <a href="#"class="gallery-icons">
                            <img id="rutgers-img" src="assets/images/Rutgers-University-300x200.jpg" id="rutgers-info-widget" alt="rutgers-info-widget">
                            <h3 id="rutgers-h3" class="gallery-title">Rutgers Info Widget</h3>
                        </a>
                    </div>
                    <div id="rock-paper-scissors-box">
                        <a href="#" class="gallery-icons">
                            <img id="rock-paper-scissors-img" src="assets/images/RPS_Logo.png" id="rock-paper-scissors" alt="rock-paper-scissors">
                            <h3 id="rock-paper-scissors-h3" class="gallery-title">Rock Paper Scissors</h3>
                        </a>
                    </div>
            </section>
        </main>
        <div id="push"></div>
    </div>
    <footer>
        <p id="copyright">copyright &copy;</p>
    </footer>
</body>
</html>
